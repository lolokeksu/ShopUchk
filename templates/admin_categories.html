<!DOCTYPE html>
<html>
<head>
    <title>Управление категориями</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* Скопируйте стили из admin.html, они подойдут */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f9fbf8 0%, #f0f4ea 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2c3e2d;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px rgba(0, 20, 0, 0.08);
        }
        h2 { font-weight: 600; font-size: 28px; margin-bottom: 20px; color: #2b4b2b; }
        .logout-link { float: right; }
        .nav-links { margin: 20px 0; }
        .nav-links a { margin-right: 25px; color: #4a7a4a; font-weight: 500; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border-bottom: 1px solid #d0dbc5;
            padding: 12px 8px;
            text-align: left;
        }
        .btn {
            background: #5b8c5a;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-danger {
            background: #d9534f;
        }
        .error-msg {
            background: #ffeeee;
            color: #a33;
            padding: 12px;
            border-radius: 18px;
            margin-bottom: 20px;
        }
        input, select {
            padding: 8px 12px;
            border: 1.5px solid #dde8d5;
            border-radius: 18px;
            font-size: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between;">
        <h2>🏷️ Управление категориями</h2>
        <a href="{{ url_for('admin_logout') }}" class="logout-link">Выйти</a>
    </div>
    <div class="nav-links">
        <a href="{{ url_for('admin_panel') }}">← Товары</a>
        <a href="{{ url_for('catalog') }}">🛒 Магазин</a>
    </div>

    {% if request.args.error %}
    <div class="error-msg">{{ request.args.error }}</div>
    {% endif %}

    <h3>➕ Добавить категорию</h3>
    <form method="post" action="{{ url_for('admin_category_add') }}" style="margin-bottom:30px;">
        <input type="text" name="name" placeholder="Название категории" required>
        <button type="submit" class="btn">Создать</button>
    </form>

    <h3>📋 Список категорий</h3>
    <table>
        <thead>
            <tr><th>Название</th><th>Действия</th></tr>
        </thead>
        <tbody>
            {% for cat in categories %}
            <tr>
                <td>{{ cat.name }}</td>
                <td>
                    <form method="post" action="{{ url_for('admin_category_edit', cat_id=cat.id) }}" style="display:inline;">
                        <input type="text" name="name" value="{{ cat.name }}" required>
                        <button type="submit" class="btn">✏️</button>
                    </form>
                    <form method="post" action="{{ url_for('admin_category_delete', cat_id=cat.id) }}" style="display:inline;" onsubmit="return confirm('Удалить категорию «{{ cat.name }}»?');">
                        <button type="submit" class="btn btn-danger">🗑️</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
