<!DOCTYPE html>
<html>
<head>
    <title>Вход в админку</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --bg-gradient-start: #f9fbf8;
            --bg-gradient-end: #f0f4ea;
            --container-bg: rgba(255, 255, 255, 0.9);
            --text-color: #2c3e2d;
            --heading-color: #2b4b2b;
            --card-bg: white;
            --border-light: #d0dbc5;
            --shadow: rgba(0, 20, 0, 0.08);
            --btn-primary: #3d6b3d;
            --btn-primary-hover: #2d542d;
            --error-bg: #ffeeee;
            --error-color: #c05a5a;
            --link-color: #4a7a4a;
        }
        body.dark {
            --bg-gradient-start: #1a1f1a;
            --bg-gradient-end: #121612;
            --container-bg: rgba(30, 35, 30, 0.9);
            --text-color: #d0d8cc;
            --heading-color: #a8c8a0;
            --card-bg: #2a322a;
            --border-light: #3a4a3a;
            --shadow: rgba(0, 0, 0, 0.3);
            --btn-primary: #4a7a4a;
            --btn-primary-hover: #3a5e3a;
            --error-bg: #4a2a2a;
            --error-color: #f8a0a0;
            --link-color: #8ab87a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-color);
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px var(--shadow);
        }
        h2 {
            font-weight: 600;
            font-size: 28px;
            margin-bottom: 20px;
            color: var(--heading-color);
        }
        input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border: 1.5px solid var(--border-light);
            border-radius: 18px;
            font-size: 16px;
            background: var(--card-bg);
            color: var(--text-color);
            transition: all 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--btn-primary);
            box-shadow: 0 0 0 4px rgba(91, 140, 90, 0.15);
        }
        button {
            background: var(--btn-primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        button:hover {
            background: var(--btn-primary-hover);
        }
        .error {
            color: var(--error-color);
            background: var(--error-bg);
            padding: 12px 16px;
            border-radius: 18px;
            margin-bottom: 15px;
            font-size: 14px;
            border-left: 4px solid var(--error-color);
        }
        p { margin-top: 20px; text-align: center; }
        a { color: var(--link-color); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--heading-color);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">🌙</button>
    <div class="container">
        <h2>🔐 Админ-панель</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post">
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        <p><a href="{{ url_for('catalog') }}">← Вернуться в магазин</a></p>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark');
            themeToggle.textContent = '☀️';
        } else {
            themeToggle.textContent = '🌙';
        }
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    </script>
</body>
</html>
