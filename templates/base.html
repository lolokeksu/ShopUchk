<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Магазин{% endblock %}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        /* Светлая тема (по умолчанию) */
        :root {
            --bg-gradient-start: #f9fbf8;
            --bg-gradient-end: #f0f4ea;
            --container-bg: rgba(255, 255, 255, 0.8);
            --text-color: #2c3e2d;
            --heading-color: #2b4b2b;
            --card-bg: white;
            --border-light: #dde8d5;
            --shadow: rgba(0, 20, 0, 0.08);
            --btn-primary: #3d6b3d;
            --btn-primary-hover: #2d542d;
            --btn-outline-border: #3d6b3d;
            --btn-outline-color: #3d6b3d;
            --link-color: #4a7a4a;
            --tabbar-bg: rgba(255, 255, 255, 0.9);
            --tab-inactive: #6b7a6b;
            --total-bg: #2b4b2b;
            --total-color: white;
            --out-of-stock-bg: #f8d7da;
            --out-of-stock-color: #721c24;
            --error-bg: #ffeeee;
            --error-color: #c05a5a;
        }

        /* Тёмная тема */
        body.dark {
            --bg-gradient-start: #1a1f1a;
            --bg-gradient-end: #121612;
            --container-bg: rgba(30, 35, 30, 0.8);
            --text-color: #d0d8cc;
            --heading-color: #a8c8a0;
            --card-bg: #2a322a;
            --border-light: #3a4a3a;
            --shadow: rgba(0, 0, 0, 0.3);
            --btn-primary: #4a7a4a;
            --btn-primary-hover: #3a5e3a;
            --btn-outline-border: #5a8a5a;
            --btn-outline-color: #b0d0a8;
            --link-color: #8ab87a;
            --tabbar-bg: rgba(30, 35, 30, 0.9);
            --tab-inactive: #9aaa98;
            --total-bg: #1e3a1e;
            --total-color: #e0f0d8;
            --out-of-stock-bg: #4a2a2a;
            --out-of-stock-color: #f8d7da;
            --error-bg: #4a2a2a;
            --error-color: #f8a0a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
            transition: background 0.3s, color 0.2s;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px var(--shadow);
            transition: background 0.3s, box-shadow 0.3s;
        }
        h2 { font-weight: 600; font-size: 28px; margin-bottom: 20px; color: var(--heading-color); }
        h3 { color: var(--heading-color); }
        .logout-link { color: var(--link-color); font-weight: 500; }
        .btn {
            background: var(--btn-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn:hover {
            background: var(--btn-primary-hover);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--btn-outline-border);
            color: var(--btn-outline-color);
        }
        .btn-danger {
            background: #d9534f;
        }
        .mobile-tabbar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tabbar-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(120, 150, 100, 0.2);
            padding: 8px 16px;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 -4px 12px var(--shadow);
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--tab-inactive);
            font-size: 12px;
            transition: color 0.2s;
            padding: 6px 0;
            flex: 1;
        }
        .tab-item.active {
            color: var(--btn-primary);
            font-weight: 500;
        }
        .tab-item i {
            font-size: 22px;
            margin-bottom: 4px;
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            margin-left: 15px;
            color: var(--heading-color);
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (max-width: 600px) {
            .mobile-tabbar { display: flex; }
            body { padding-bottom: 80px; }
        }
    </style>
    {% block styles %}{% endblock %}
</head>
<body>
    <div class="container">
        <div class="header-row">
            <h2>{% block header %}Магазин{% endblock %}</h2>
            <div>
                <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">🌙</button>
                {% if session.user_phone %}
                    <a href="{{ url_for('logout') }}" class="logout-link">Выйти</a>
                {% endif %}
            </div>
        </div>
        {% block content %}{% endblock %}
    </div>

    <nav class="mobile-tabbar">
        <a href="{{ url_for('catalog') }}" class="tab-item {% if request.endpoint == 'catalog' %}active{% endif %}">
            <i>🛒</i>
            <span>Магазин</span>
        </a>
        <a href="{{ url_for('user_profile_view') }}" class="tab-item {% if request.endpoint == 'user_profile_view' %}active{% endif %}">
            <i>👤</i>
            <span>Профиль</span>
        </a>
        <!-- Корзина удалена -->
    </nav>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark');
            themeToggle.textContent = '☀️';
        } else {
            themeToggle.textContent = '🌙';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
