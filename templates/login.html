{% extends "base.html" %}

{% block title %}Вход{% endblock %}
{% block header %}🍅 Вход{% endblock %}

{% block styles %}
<style>
    input {
        width: 100%;
        padding: 14px 18px;
        margin: 10px 0;
        border: 1.5px solid var(--border-light);
        border-radius: 18px;
        font-size: 16px;
        background: var(--card-bg);
        color: var(--text-color);
        transition: all 0.2s ease;
    }
    input:focus {
        outline: none;
        border-color: var(--btn-primary);
        box-shadow: 0 0 0 4px rgba(91, 140, 90, 0.15);
    }
    .error {
        color: var(--error-color);
        background: var(--error-bg);
        padding: 12px 16px;
        border-radius: 18px;
        margin-bottom: 15px;
        font-size: 14px;
        border-left: 4px solid var(--error-color);
    }
    p { text-align: center; margin-top: 20px; }
    a { color: var(--link-color); }
</style>
{% endblock %}

{% block content %}
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="post">
    <input type="tel" name="phone" id="phone" placeholder="+7 (___) ___-__-__" required>
    <input type="password" name="password" placeholder="🔒 Пароль" required>
    <button type="submit" class="btn" style="width:100%; margin-top:15px;">Войти</button>
</form>
<p>Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>

<script>
    const phoneInput = document.getElementById('phone');

    function maskPhone(event) {
        let value = event.target.value.replace(/\D/g, '');
        if (!value.startsWith('7')) {
            value = '7' + value;
        }
        let formatted = '+7 ';
        if (value.length > 1) formatted += '(' + value.substring(1, 4);
        if (value.length >= 4) formatted += ') ' + value.substring(4, 7);
        if (value.length >= 7) formatted += '-' + value.substring(7, 9);
        if (value.length >= 9) formatted += '-' + value.substring(9, 11);
        event.target.value = formatted;
    }

    phoneInput.addEventListener('input', maskPhone);
    phoneInput.addEventListener('focus', maskPhone);
    phoneInput.addEventListener('blur', maskPhone);
</script>
{% endblock %}
