<!DOCTYPE html>
<html>
<head>
    <title>Заказ оформлен</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f9fbf8 0%, #f0f4ea 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 20, 0, 0.1);
        }
        h2 { color: #2b4b2b; margin-bottom: 20px; }
        .order-info {
            background: #eef4e9;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        .btn {
            background: #3d6b3d;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #3d6b3d;
            color: #3d6b3d;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>✅ Заказ №{{ order_id }} оформлен!</h2>
    <p>Спасибо за заказ! Мы свяжемся с вами в ближайшее время.</p>
    <div class="order-info">
        <p>Сумма заказа: <strong>{{ total }} ₽</strong></p>
    </div>
    <a href="{{ url_for('shop.catalog') }}" class="btn">Вернуться в каталог</a>
    <a href="{{ url_for('shop.user_profile_view') }}" class="btn btn-outline">Мои заказы</a>
</div>
</body>
</html>
