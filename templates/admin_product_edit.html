<!DOCTYPE html>
<html>
<head>
    <title>Редактирование товара</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --bg-gradient-start: #f9fbf8;
            --bg-gradient-end: #f0f4ea;
            --container-bg: rgba(255, 255, 255, 0.9);
            --text-color: #2c3e2d;
            --heading-color: #2b4b2b;
            --card-bg: white;
            --border-light: #d0dbc5;
            --shadow: rgba(0, 20, 0, 0.08);
            --btn-primary: #3d6b3d;
            --btn-primary-hover: #2d542d;
            --btn-danger: #d9534f;
            --link-color: #4a7a4a;
            --section-bg: #f0f4ea;
        }
        body.dark {
            --bg-gradient-start: #1a1f1a;
            --bg-gradient-end: #121612;
            --container-bg: rgba(30, 35, 30, 0.9);
            --text-color: #d0d8cc;
            --heading-color: #a8c8a0;
            --card-bg: #2a322a;
            --border-light: #3a4a3a;
            --shadow: rgba(0, 0, 0, 0.3);
            --btn-primary: #4a7a4a;
            --btn-primary-hover: #3a5e3a;
            --btn-danger: #c0504a;
            --link-color: #8ab87a;
            --section-bg: #2a352a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px var(--shadow);
        }
        h2 { font-weight: 600; font-size: 28px; margin-bottom: 20px; color: var(--heading-color); }
        h3 { font-weight: 600; font-size: 20px; margin: 20px 0 10px; color: var(--heading-color); }
        .form-group { margin-bottom: 20px; }
        label { font-weight: 500; display: block; margin-bottom: 5px; color: var(--text-color); }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--border-light);
            border-radius: 18px;
            font-size: 16px;
            background: var(--card-bg);
            color: var(--text-color);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .checkbox-group input {
            width: auto;
        }
        .variant-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .variant-item input {
            flex: 1;
            min-width: 150px;
        }
        .btn {
            background: var(--btn-primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-danger {
            background: var(--btn-danger);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 14px;
        }
        .add-variant {
            margin-top: 20px;
            padding: 15px;
            background: var(--section-bg);
            border-radius: 20px;
        }
        .actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            margin-right: 15px;
            color: var(--heading-color);
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-row">
        <h2>✏️ Редактирование товара</h2>
        <div>
            <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">🌙</button>
            <a href="{{ url_for('admin.admin_logout') }}" class="logout-link">Выйти</a>
        </div>
    </div>
    <form method="post">
        <div class="form-group">
            <label>Название</label>
            <input type="text" name="name" value="{{ product.name }}" required>
        </div>
        <div class="form-group">
            <label>Категория</label>
            <select name="category_id" required>
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if cat.id == product.category_id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group checkbox-group">
            <input type="checkbox" name="available" id="available" {% if product.available %}checked{% endif %}>
            <label for="available">В наличии</label>
        </div>

        <h3>📦 Варианты товара</h3>
        <div id="variants-container">
            {% for variant in product.variants %}
            <div class="variant-item">
                <input type="text" name="variant_name_{{ variant.id }}" value="{{ variant.name }}" placeholder="Название" required>
                <input type="number" name="variant_price_{{ variant.id }}" value="{{ variant.price }}" step="0.01" min="0" placeholder="Цена" required style="width:120px;">
                <select name="variant_unit_{{ variant.id }}">
                    <option value="kg" {% if variant.unit == 'kg' %}selected{% endif %}>кг</option>
                    <option value="pcs" {% if variant.unit == 'pcs' %}selected{% endif %}>шт</option>
                </select>
            </div>
            {% endfor %}
        </div>

        <div class="actions">
            <button type="submit" class="btn">💾 Сохранить</button>
            <a href="{{ url_for('admin.admin_panel') }}" class="btn" style="background: #aaa;">Отмена</a>
        </div>
    </form>

    {% for variant in product.variants %}
    <form method="post" action="{{ url_for('admin.admin_delete_variant', variant_id=variant.id) }}" style="display: inline;" onsubmit="return confirm('Удалить вариант «{{ variant.name }}»?');">
        <button type="submit" class="btn btn-danger btn-sm" style="margin-top: 5px;">🗑️ Удалить «{{ variant.name }}»</button>
    </form>
    {% endfor %}

    <div class="add-variant">
        <form method="post" action="{{ url_for('admin.admin_add_variant') }}">
            <input type="hidden" name="product_id" value="{{ product.id }}">
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="text" name="name" placeholder="Название варианта" required style="flex:2;">
                <input type="number" name="price" step="0.01" min="0" placeholder="Цена" required style="width:120px;">
                <select name="unit">
                    <option value="kg">кг</option>
                    <option value="pcs">шт</option>
                </select>
                <button type="submit" class="btn btn-sm">➕ Добавить</button>
            </div>
        </form>
    </div>
</div>

<script>
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        body.classList.add('dark');
        themeToggle.textContent = '☀️';
    } else {
        themeToggle.textContent = '🌙';
    }
    themeToggle.addEventListener('click', () => {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        themeToggle.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
</script>
</body>
</html>
